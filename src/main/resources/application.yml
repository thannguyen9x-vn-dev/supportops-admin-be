spring:
  application:
    name: supportops-admin-be

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/supportops}
    username: ${DB_USER:dev}
    password: ${DB_PASS:dev123}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  auth:
    jwt-secret: ${JWT_SECRET:dev-secret-key-min-32-characters-long-enough}
    access-token-ttl-seconds: ${ACCESS_TOKEN_TTL_SECONDS:900}
    refresh-token-ttl-seconds: ${REFRESH_TOKEN_TTL_SECONDS:604800}
    cookie-secure: ${COOKIE_SECURE:false}
    cookie-same-site: ${COOKIE_SAME_SITE:Lax}
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN:http://localhost:3000}

  seed:
    dev-user-enabled: ${SEED_DEV_USER_ENABLED:true}
    dev-user-email: ${SEED_DEV_USER_EMAIL:admin@supportops.local}
    dev-user-password: ${SEED_DEV_USER_PASSWORD:Admin@12345}
    dev-user-first-name: ${SEED_DEV_USER_FIRST_NAME:Support}
    dev-user-last-name: ${SEED_DEV_USER_LAST_NAME:Admin}
    dev-tenant-name: ${SEED_DEV_TENANT_NAME:SupportOps Dev}

server:
  port: ${PORT:8080}
